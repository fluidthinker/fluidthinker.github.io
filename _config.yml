title: "Christopher Randle Portfolio"
description: "Geospatial data, remote sensing, spatial analytics, and environmental decision-support projects."
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: single
      author_profile: false
      share: false
  - scope:
      path: ""
    values:
      layout: single

include:
  - _pages

minimal_mistakes_skin: "default"

atom_feed:
  hide: true

search: false

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/fluidthinker"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "PASTE-YOUR-LINKEDIN-URL-HERE"